<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moia Seoul</title>
  <!-- JQuery CDN -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <!-- Slick Slider -->
  <script src="js/slick/slick.min.js"></script>
  <link rel="stylesheet" href="js/slick/slick-theme.css">
  <link rel="stylesheet" href="js/slick/slick.css">
  <!-- Custom CSS $ JS -->
  <link rel="icon" href="images/favicon.png">
  <link rel="stylesheet" href="style.css">
  <script src="js/custom.js"></script>
</head>
<body>

  
  <div class="container">
    <!-- Header -->
    <div class="header-include"></div>
    <!-- Section : Login -->
    <section class="login">
      <div class="login-inner">
        <h1>LOGIN</h1>
        <div class="login-info">
          <div class="field">
            <div>
              <input type="text" placeholder="ID">
            </div>
            <div>
              <input type="password" placeholder="PASSWORD">
            </div>
          </div>
        </div>
        <div class="id-save">
          <label><input type="checkbox"> 아이디저장</label>
        </div>
        <button class="btn-login">로그인</button>
        <a class="btn-kakao" href="#none">
          <i class="ri-kakao-talk-fill"></i> 카카오로 시작하기
          <span class="login-tooltip">이제 쉽고 간편하게 로그인하세요!</span>
        </a>
        <div class="login-desc">
          <div class="find-register">
            <a href="#none">아이디찾기</a>
            <a href="#none">비밀번호찾기</a>
            <a href="#none">회원가입</a>
          </div>
        </div>
      </div>
    </section>
    <!-- Footer -->
    <div class="footer-include"></div>

  </div>

  
</body>
</html>
