<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flex responsive photo gallery</title>
  <!-- UIkit CSS & JS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.14.1/dist/css/uikit.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/uikit@3.14.1/dist/js/uikit.min.js"></script>
  <!-- JQuery CDN -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
    
  <section class="gallery">
    <div class="gallery-inner">
      <div class="gallery-header">
        <div class="gnb-outer">
          <div class="gnb">
            <a href="#none">WEDDING</a>
            <a href="#none">Q&A</a>
            <a href="#none">NOTICE</a>
          </div>
        </div>
        <div class="search-outer">
          <div class="search">
            <input type="search" placeholder="search">
          </div>
          <button class="btn-inquire">RESERVATION</button>
        </div>
      </div>
      <div class="gallery-items" uk-lightbox="animation: fade; autoplay: 1; autoplay-interval: 2000; pause-on-hover: true;" >
        <div class="gallery-item">
          <a href="images/img01.jpg" data-caption="이미지 타이틀"><img src="images/img01.jpg" alt=""></a>
          <div class="caption">
            <h5>신라호텔</h5>
            <div>
              <span><i class='bx bxs-heart'></i> 300 Likes</span>
              <i class='bx bx-share-alt'></i>
            </div>
          </div>
        </div>
        <div class="gallery-item">
          <a href="images/img02.jpg"><img src="images/img02.jpg" alt=""></a>

            </div>
          </div>
        </div>

              <span><i class='bx bxs-heart'></i> 200 Likes</span>
              <i class='bx bx-share-alt'></i>
            </div>
          </div>
        </div>
        <div class="gallery-item">
          <a href="images/img04.jpg"><img src="images/img04.jpg" alt=""></a>
          <div class="caption">
            <h5>SIGNATURE 5</h5>
