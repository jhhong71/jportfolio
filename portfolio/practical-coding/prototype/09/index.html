<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>Tesla</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="images/tesla_favicon.png">
</head>
<body>

  <div class="container">
    <header>
      <div class="logo">
        <a href="#none"><img src="images/logo.png"></a>
      </div>
      <div class="gnb">
        <a href="#none">model s</a>
        <a href="#none">model 3</a>
        <a href="#none">model x</a>
        <a href="#none">model y</a>
        <a href="#none">roadster</a>
        <a href="#none">energy</a>
      </div>
      <div class="lnb">
        <a href="#none">shop</a>
        <a href="#none">sign in</a>
      </div>
    </header>
    <section class="slide">
      <input type="radio" name="slide" id="slide1">
      <input type="radio" name="slide" id="slide2" checked>
      <input type="radio" name="slide" id="slide3">
      <div class="heading">
        <div class="model">
          <h1>Model S</h1>
          <h1>Model 3</h1>
          <h1>Model X</h1>
        </div>
        <div class="customer">
          <a href="#none">customer oder</a>
          <a href="#none">exsisting inventory</a>
        </div>
        <a class="btn-visit" href="#none">Visit a store</a>
      </div>
      <div class="slide-image"></div>
      <div class="btn">
        <label for="slide1"></label>
        <label for="slide2"></label>
        <label for="slide3"></label>
      </div>
      
      <div class="frame">
        <input type="checkbox" id="trigger">
        <label for="trigger">
          <span></span>
          <span></span>
          <span></span>
        </label>
        <div class="sidebar">
          <div class="navi">
            <a href="#none">existing inventory</a>
            <a href="#none">used inventory</a>
            <a href="#none">insurance</a>
            <a href="#none">find us</a>
            <a href="#none">test drive</a>
            <a href="#none">support</a>
            <a href="#none">get newsletter</a>
            <a href="#none">news</a>
            <a href="#none">charging</a>
            <a href="#none">semi</a>
            <a href="#none">carbon impact</a>
            <a href="#none"><img src="images/icon-flag.png"> united states</a>
          </div>
        </div>
        <div class="overlay"></div>
      </div>
    </section>
  </div>

</body>
</html>
