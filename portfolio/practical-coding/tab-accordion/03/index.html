<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Switcher</title>
  <!-- UIkit CSS & JS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.14.1/dist/css/uikit.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/uikit@3.14.1/dist/js/uikit.min.js"></script>
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h4><b>KB</b> 국민의 평생 금융파트너</h4>
    <div class="mypage">
      <span>
        <i class="bi bi-person-circle"></i> My Liiv
      </span>
      <div>
        <a href="#none">환경설정</a>
        <a href="#none">상담신청</a>
      </div>
    </div>
    <div class="indicator">
      <ul uk-tab="animation: uk-animation-fade">
        <li><a href="#">국민은행</a></li>
        <li><a href="#">KB금융그룹</a></li>
      </ul>
      <ul class="uk-switcher uk-margin">
        <li>
          <div class="service-menu">
            <div class="subtitle">
              <em>간편</em>뱅킹
            </div>
            <div class="content">
              <a href="#none"><i class="bi bi-coin"></i><b>간편조회</b></a>
              <a href="#none"><i class="bi bi-chat-text"></i><b>리브톡</b></a>
              <a href="#none"><i class="bi bi-credit-card"></i><b>더치페이</b></a>
            </div>
          </div>
          <div class="service-menu">
            <div class="subtitle">
              <em>리브</em>라이프
            </div>
            <div class="content">
              <a href="#none"><i class="bi bi-gift"></i><b>선물하기</b></a>
              <a href="#none"><i class="bi bi-envelope"></i><b>경조사</b></a>
              <a href="#none"><i class="bi bi-calendar4-week"></i><b>캘린더</b></a>
            </div>
          </div>
          <div class="service-menu">
            <div class="subtitle">
              <em>가까운</em>은행
            </div>
            <div class="content">
              <a href="#none"><i class="bi bi-geo-alt"></i><b>지점찾기</b></a>
              <a href="#none"><i class="bi bi-cash-coin"></i><b>간편출금</b></a>
              <a href="#none"><i class="bi bi-award"></i></i><b>금융상품</b></a>
            </div>
          </div>
          <div class="service-menu">
            <div class="subtitle">
              <em>스마트</em>외환
            </div>
            <div class="content">
              <a href="#none"><i class="bi bi-currency-exchange"></i><b>환전</b></a>
              <a href="#none"><i class="bi bi-cash-stack"></i><b>맞춤환전</b></a>
              <a href="#none"><i class="bi bi-briefcase"></i><b>리브송금</b></a>
            </div>
          </div>
        </li>
        <li>
          <div class="service-menu">
            <div class="subtitle">
              <em>KB</em>증권
            </div>
            <div class="content">
              <a href="#none"><i class="bi bi-currency-dollar"></i><b>주식매매</b></a>
              <a href="#none"><i class="bi bi-search"></i><b>잔고조회</b></a>
              <a href="#none"><i class="bi bi-card-checklist"></i><b>체결내역</b></a>
            </div>
          </div>
          <div class="service-menu">
            <div class="subtitle">
              <em>KB</em>손해보험
            </div>
            <div class="content">
              <a href="#none"><i class="bi bi-exclamation-circle"></i><b>자차보험</b></a>
              <a href="#none"><i class="bi bi-aspect-ratio"></i><b>보장진단</b></a>
              <a href="#none"><i class="bi bi-file-earmark-arrow-up"></i><b>보험청구</b></a>
            </div>
          </div>
          <div class="service-menu">
            <div class="subtitle">
              <em>KB</em>카드
            </div>
            <div class="content">
              <a href="#none"><i class="bi bi-wallet"></i><b>간편결제</b></a>
              <a href="#none"><i class="bi bi-receipt-cutoff"></i><b>대출신청</b></a>
              <a href="#none"><i class="bi bi-credit-card-2-back"></i><b>카드론</b></a>
            </div>
          </div>
          <div class="service-menu">
            <div class="subtitle">
              <em>KB</em>캐피탈
            </div>
            <div class="content">
              <a href="#none"><i class="bi bi-house-door"></i><b>홈으로</b></a>
              <a href="#none"><i class="bi bi-clipboard2-pulse"></i><b>시세조회</b></a>
              <a href="#none"><i class="bi bi-handbag"></i><b>내차팔기</b></a>
            </div>
          </div>
        </li>
      </ul>
    </div>
  </div>

</html>
