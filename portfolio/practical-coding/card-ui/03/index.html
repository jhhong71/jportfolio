<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>To Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="logo">
    <img src="logo.png">
  </div>
  <div class="list">
    <h2>온라인 강의 체크리스트</h2>
    <label>
      <input type="checkbox">
      <em></em>
      <span>강의계획서 및 공지사항 확인하기</span>
    </label>
    <label>
      <input type="checkbox">
      <em></em>
      <span>개인 컴퓨터 및 노트북, 카메라, 마이크 점검하기</span>
    </label>
    <label>
      <input type="checkbox">
      <em></em>
      <span>강의전 인터넷(유선 및 무선 네트워크) 연결 확인하기</span>
    </label>
    <label>
      <input type="checkbox">
      <em></em>
      <span>인터넷 브라우저(Edge, Chrome, Whale 등) 확인하기</span>
    </label>
    <label>
      <input type="checkbox">
      <em></em>
      <span>강의영상 시청 전 출석인정기간 확인하기</span>
    </label>
    <label>
      <input type="checkbox">
      <em></em>
      <span>강의영상 시청 후 출석 현황 확인하기</span>
    </label>
    <label>
      <input type="checkbox">
      <em></em>
      <span>교수자 허가 없는 강의 녹화 및 배포 금지</span>
    </label>
    <label>
      <input type="checkbox">
      <em></em>
      <span>퀴즈 재응시 가능 여부를 담당 교수자에게 미리 확인하기</span>
    </label>
  </div>
</div>
  
  
</body>
</html>
