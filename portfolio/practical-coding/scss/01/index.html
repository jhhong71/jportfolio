<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>SCSS Login-Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="login">
    <h1>Member Login</h1>
    <div class="field">
      <input type="email" placeholder="Your Email">
      <i class='bx bx-user'></i>
    </div>
    <div class="field">
      <input type="password" placeholder="Your Password">
      <i class='bx bx-lock-alt'></i>
    </div>
    <div class="status">
      <label>
        <input type="checkbox"><em></em>Remeber me
      </label>
      <a href="#none">Forgot password?</a>
    </div>
    <button class="btn-login">Sign in</button>
    <span class="or">or</span>
    <a href="#none">Register Now</a>
  </div>
  
</body>
</html>
