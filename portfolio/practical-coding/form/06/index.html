<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Tooltip Login Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="login">
    <h1>로그인</h1>
    <div class="login-info">
      <div class="field">
        <div>
          <span>아이디</span><input type="text">
        </div>
        <div>
          <span>비밀번호</span><input type="password">
        </div>
      </div>
      <button>로그인</button>
    </div>
    <div class="id-save">
      <label><input type="checkbox"> 아이디저장</label>
    </div>
    <div class="find-register">
      <a href="#none">아이디찾기</a>
      <a href="#none">비밀번호찾기</a>
      <a href="#none">회원가입</a>
    </div>
    <a class="btn-kakao" href="#none">
      <i class="fa fa-comment"></i> 카카오로 시작하기
      <span class="tooltip">이제 쉽고 간편하게 로그인하세요!</span>
    </a>
  </div>

</body>
</html>
