<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Application Form</title>
  <!-- JQuery CDN -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  

  <section>
    <div class="consulting-header">
      <h1>
        퍼블리싱 학습의 새로운 <span>패러다임!<br></span>
        신속하게 <span>인프런 간편 상담</span>을 신청하실 수 있습니다.
      </h1>
      <p>
        상담 내용에 따라 비용과 절차에 관련하여 전화 또는 이메일로 신속하게 상담해 드립니다.
      </p>
    </div>
    <div class="consulting-form">
      <div class="fields">
        <div class="field">
          <span>이름<em>*</em></span>
          <input type="text" placeholder="이름을 입력하세요." required>
        </div>
        <div class="field">
          <span>이메일<em>*</em></span>
          <input type="email" placeholder="이메일을 입력하세요." required>
        </div>
      </div>
      <div class="fields">
        <div class="field">
          <span>연락처<em>*</em></span>
          <input type="text" placeholder="ex) 010-1234-1234" required>
        </div>
        <div class="field">
          <span>상담구분</span>
          <select>
            <option value="">선택하세요.</option>
            <option value="">온라인 강의 신청</option>
            <option value="">오프라인 강의 신청</option>
          </select>
        </div>
      </div>
      <div class="fields">
        <div class="field">
          <span>상담내용<em>*</em></span>
          <textarea placeholder="상담접수가 이루어진 후 24시간 내에 연락드리겠습니다. 감사합니다." required></textarea>
        </div>
      </div>
      <div class="fields policy">
        <div class="field">
          <span>개인정보 취급방침 <em>(필수)</e></span>
          <iframe src="policy.html" frameborder="0"></iframe>
        </div>
        <div class="field">
          <label style="cursor: pointer;"><input id="chk-agree" type="checkbox"><b>개인정보 취급방침을 읽었으며 이에 동의합니다.</b></label>
        </div>
      </div>
    </div>
    <button class="btn-submit">상담신청</button>
  </section>

  
</body>
</html>
