<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Naver Band Login</title>
  <link rel="icon" href="images/favicon.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <header>
      <a href="#none"><img src="images/logo-band.png"></a>
    </header>
    <section>
      <div class="login">
        <h1>로그인</h1>
        <a class="btn mobile" href="#none">휴대폰 번호로 로그인</a>
        <span class="or">또는</span>
        <a class="btn email" href="#none">이메일로 로그인</a>
        <a class="btn naver" href="#none">네이버로 로그인</a>
        <a class="btn facebook" href="#none">페이스북으로 로그인</a>
        <a class="btn line" href="#none">라인으로 로그인</a>
        <a class="btn apple" href="#none">애플로 로그인</a>
        <label>
          <!-- 글자까지 클릭가능 -->
          <input type="checkbox">로그인 상태 유지
        </label>
        <p>
          밴드가 처음이신가요? <a href="#none">회원가입</a>
        </p>
      </div>
    </section>

  </div>

</body>

</html>
