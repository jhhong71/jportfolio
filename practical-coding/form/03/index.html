<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
  <title>Starbucks Sign Up</title>
  <link rel="icon" href="images/favicon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
 
 <div class="member">
   <div class="logo">
     <img src="images/logo.png">
   </div>
   <div class="login-info">
    <div class="field info">
      <b>User Email</b>
      <input type="email" placeholder="Type your email">
    </div>
    <div class="field info">
      <b>User Password</b>
      <input type="password" placeholder="Type your password">
    </div>
    <div class="field save-email">
      <div>
        <label><input type="checkbox"><em>Save your email</em></label>
        <a href="#none">Forgot password?</a>
      </div>
    </div>
    <div class="field answer">
      <div>
        <i>Would you like to receive event emails?</i>
        <div>
          <label><input type="radio" name="answer"><em></em>Yes</label>
          <label><input type="radio" name="answer"><em></em>No</label>
        </div>
      </div>
    </div>
    <div class="field">
      <button class="btn-login">LOGIN</button>
    </div>
    <div class="field">
      <span class="or">OR</span>
    </div>
    <div class="field sns">
      <div>
        <a href="#none"><i class="xi-google"></i></a>
        <a href="#none"><i class="xi-facebook"></i></a>
        <a href="#none"><i class="xi-naver"></i></a>
        <a href="#none"><i class="xi-kakaotalk"></i></a>
      </div>
    </div>
    <div class="field signup">
      <b>Have not account yet?</b>
      <a href="#none">Sign up</a>
    </div>
   </div>
 </div>
  
</body>
</html>
