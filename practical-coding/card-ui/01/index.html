<!doctype html>
<html lang="ko">
	<head>
		<meta charset="utf-8">
		<title>Table Enrolment</title>
    <link rel="stylesheet" href="style.css">
	</head>
	<body>

    <table class="frame">
      <caption>Web Hosting Price</caption>
      <tr>
        <td>
          <h1>STARTED</h1>
          <h2>$19<span>per month</span></h2>
          <ul class="detail">
            <li><b>2</b>websites</li>
            <li><b>5GB</b>storage</li>
            <li><b>3</b>users</li>
          </ul>
          <a class="btn" href="#">Choose plan</a>
        </td>
        <td>
          <h1>PREMIUM</h1>
          <h2>$99<span>per month</span></h2>
          <ul class="detail">
            <li><b>20</b>websites</li>
            <li><b>50GB</b>storage</li>
            <li><b>25</b>users</li>
          </ul>
          <a class="btn" href="#">Choose plan</a>
        </td>
        <td>
          <h1>CORPORATE</h1>
          <h2>$100<span>per month</span></h2>
          <ul class="detail">
            <li><b>50</b>websites</li>
            <li><b>200GB</b>storage</li>
            <li><b>∞</b>users</li>
          </ul>
          <a class="btn" href="#">Choose plan</a>
        </td>
      </tr>
    </table>

  </body>
</html>
