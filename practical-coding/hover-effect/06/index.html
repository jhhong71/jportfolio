<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>shopping mall-item ui</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
    
  <section>
    <div class="inner">
      <h1><b>기분 좋은 생활</b>을 제안하는 <span>무인양품</span></h1>
      <div class="content">
        <h2>Weekly Best</h2>
        <div class="items">
          <div class="item">
            <div class="photo">
              <a href="#none">
                <img src="images/img-a-02.jpg" alt="">
                <img src="images/img-a-03.jpg" alt="">
              </a>
            </div>
            <div class="desc">
              <span class="price"><b>18%</b> 23,000원</span>
              <span class="name">단순생활 선풍기</span>
              <span class="count">구매 30</span>
            </div>
          </div>
          <div class="item">
            <div class="photo">
              <a href="#none">
                <img src="images/img-b-01.jpg" alt="">
                <img src="images/img-b-02.jpg" alt="">
              </a>
            </div>
            <div class="desc">
              <span class="price"><b>30%</b> 68,900원</span>
              <span class="name">샤오미 핸디 무선청소기</span>
              <span class="count">구매 46</span>
            </div>
          </div>
          <div class="item">
            <div class="photo">
              <a href="#none">
                <img src="images/img-c-01.jpg" alt="">
                <img src="images/img-c-02.jpg" alt="">
              </a>
            </div>
            <div class="desc">
              <span class="price"><b>23%</b> 34,900원</span>
              <span class="name">역사 시계ㆍ미니ㆍ마그넷 부착</span>
              <span class="count">구매 24</span>
            </div>
          </div>
          <div class="item">
            <div class="photo">
              <a href="#none">
                <img src="images/img-d-01.jpg" alt="">
                <img src="images/img-d-02.jpg" alt="">
              </a>
            </div>
            <div class="desc">
              <span class="price"><b>15%</b> 39,900원</span>
              <span class="name">UV컷 프렌치 리넨 · 크로쉐</span>
              <span class="count">구매 27</span>
            </div>
          </div>
          <div class="item">
            <div class="photo">
              <a href="#none">
                <img src="images/img-e-01.jpg" alt="">
                <img src="images/img-e-02.jpg" alt="">
              </a>
            </div>
            <div class="desc">
              <span class="price"><b>15%</b> 59,000원</span>
              <span class="name">아로마 디퓨저</span>
              <span class="count">구매 98</span>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>

  
</body>
</html>
