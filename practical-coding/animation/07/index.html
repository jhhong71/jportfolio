<!doctype html>
<html lang="ko">
<head>
	<meta charset="utf-8">
	<title>Animation Skill Bar</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>

	
	<div class="skill">
		<h1>Lineage Stat</h1>
		<div class="item">
			<p>
				<span>STRength (STR)</span>
				<span>90%</span>
			</p>
			<div class="progress">
				<span class="progress-bar" style="width: 50%"></span>
			</div>
		</div>
		<div class="item">
			<p>
				<span>INTelligence (INT)</span>
				<span>80%</span>
			</p>
			<div class="progress">
				<span class="progress-bar" style="width: 80%"></span>
			</div>
		</div>
		<div class="item">
			<p>
				<span>CONstitution (CON)</span>
				<span>65%</span>
			</p>
			<div class="progress">
				<span class="progress-bar" style="width: 65%"></span>
			</div>
		</div>
		<div class="item">
			<p>
				<span>DEXterity (DEX)</span>
				<span>70%</span>
			</p>
			<div class="progress">
				<span class="progress-bar" style="width: 70%"></span>
			</div>
		</div>
		<div class="item">
			<p>
				<span>MENtality (MEN)</span>
				<span>85%</span>
			</p>
			<div class="progress">
				<span class="progress-bar" style="width: 85%"></span>
			</div>
		</div>
		<div class="item">
			<p>
				<span>WIT</span>
				<span>85%</span>
			</p>
			<div class="progress">
				<span class="progress-bar" style="width: 85%"></span>
			</div>
		</div>
	</div>


</body>
</html>
